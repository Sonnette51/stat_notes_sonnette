site_name: Sonnette's Notes 
site_url: https://Sonnette51.github.io/stat_notes_sonnette/
site_description: 清华统计课程笔记

theme:
  name: material
  language: zh
  palette:
    # 浅色模式
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    # 深色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  features:
    - navigation.tabs          # 顶部标签导航
    - navigation.sections      # 侧边栏分组
    - navigation.top           # 回到顶部按钮
    - navigation.indexes       # 文件夹 index.md 作为章节首页
    - toc.follow               # 目录跟随滚动高亮
    - search.suggest           # 搜索建议
    - search.highlight         # 搜索结果高亮
    - content.code.copy        # 代码块一键复制

plugins:
  - search:
      lang: zh
  - roamlinks                  # 支持 Obsidian [[wikilinks]] 内部链接

markdown_extensions:
  - admonition                 # 提示框
  - pymdownx.details           # 可折叠块
  - pymdownx.superfences:      # 代码块增强
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:        # 代码语法高亮
      anchor_linenums: true
  - pymdownx.inlinehilite      # 行内代码高亮
  - pymdownx.tabbed:           # 标签页
      alternate_style: true
  - pymdownx.arithmatex:       # 数学公式 $...$ 和 $$...$$
      generic: true
  - tables                     # Markdown 表格
  - attr_list                  # 给元素加属性
  - md_in_html                 # HTML 中写 Markdown
  - footnotes                  # 脚注
  - toc:
      permalink: true          # 标题加锚点链接

# 加载 KaTeX 渲染数学公式（比 MathJax 快）
extra_javascript:
  - https://unpkg.com/katex@0.16.10/dist/katex.min.js
  - https://unpkg.com/katex@0.16.10/dist/contrib/auto-render.min.js
  - javascripts/katex.js

extra_css:
  - https://unpkg.com/katex@0.16.10/dist/katex.min.css

nav:
  - 首页: index.md
  - 初等概率论:
    - 初等概率论/index.md
    - Lecture01 概率模型与性质: 初等概率论/Lecture01 概率模型与性质.md
    - Lecture02 概率空间、条件概率: 初等概率论/Lecture02 概率空间、条件概率.md
    - Lecture03 独立性、随机变量: 初等概率论/Lecture03 独立性、随机变量.md
    - Lecture04 常见随机变量: 初等概率论/Lecture04 常见随机变量.md
    - "Lecture05 概率分布函数、随机变量函数的分布、随机向量的分布(I)": 初等概率论/Lecture05 概率分布函数、随机变量函数的分布、随机向量的分布(I).md
    - "Lecture06 随机向量的分布(II)": 初等概率论/Lecture06 随机向量的分布(II).md
    - Lecture07 随机向量函数的分布、次序统计量、p分位数: 初等概率论/Lecture07 随机向量函数的分布、次序统计量、p分位数.md
    - Lecture08 期望、方差、相关不等式: 初等概率论/Lecture08 期望、方差、相关不等式.md
    - Lecture09 条件期望、条件方差: 初等概率论/Lecture09 条件期望、条件方差.md
    - Lecture10 协方差、相关: 初等概率论/Lecture10 协方差、相关.md
    - Lecture11 概率母函数、矩母函数、特征函数: 初等概率论/Lecture11 概率母函数、矩母函数、特征函数.md
    - Lecture12 大数定律: 初等概率论/Lecture12 大数定律.md
    - 中心极限定理（CLT）讲义: "初等概率论/中心极限定理（CLT）讲义.md"
    - Lecture14 多元正态分布: 初等概率论/Lecture14 多元正态分布.md
    - 复习材料:
      - "期末记忆要点汇总（模块 1-7）": "初等概率论/期末记忆要点汇总（模块 1-7）.md"
      - "模块 1：随机向量的函数": "初等概率论/模块 1：随机向量的函数.md"
      - "模块 2：次序统计量与p-分位数": "初等概率论/模块 2：次序统计量与p-分位数.md"
      - "模块 3：期望与方差": "初等概率论/模块 3：期望与方差.md"
      - "模块 4：条件期望、协方差与不等式": "初等概率论/模块 4：条件期望、协方差与不等式.md"
